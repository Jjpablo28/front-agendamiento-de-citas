<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <span class="brand-icon">🩺</span>
      <h1>MediGestion</h1>
      <p class="brand-sub">Portal de Acceso Clínico</p>
    </div>

    <div class="alert alert-error" *ngIf="error">
      <span class="alert-icon">⚠️</span>
      {{ error }}
    </div>

    <div class="form-group">
      <label for="identificador">Documento o Correo Electrónico</label>
      <input
        id="identificador"
        type="text"
        [(ngModel)]="identificador"
        placeholder="Ej: 10023456 o usuario@email.com"
        [disabled]="cargando"
        (keyup.enter)="iniciarSesion()"
      />
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-password-wrap">
        <input
          id="password"
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
          [disabled]="cargando"
          (keyup.enter)="iniciarSesion()"
        />
        <button type="button" class="toggle-password" (click)="togglePassword()">
          {{ mostrarPassword ? '🙈' : '👁️' }}
        </button>
      </div>
    </div>

    <button
      class="btn-login"
      (click)="iniciarSesion()"
      [disabled]="cargando"
    >
      <span *ngIf="!cargando">Ingresar al Sistema</span>
      <span *ngIf="cargando" class="spinner-text">⏳ Verificando...</span>
    </button>

    <p class="login-footer">
      ¿Eres paciente nuevo?
      <a routerLink="/register">Crear cuenta aquí</a>
    </p>

  </div>
</div>

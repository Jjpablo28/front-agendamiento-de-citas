<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <span class="brand-icon">🩺</span>
      <h1>MediGestion</h1>
      <p class="brand-sub">Crear una cuenta nueva</p>
    </div>

    <!-- Tabs de selección de rol -->
    <div class="role-tabs">
      <button
        class="role-tab"
        [class.active]="tabActiva === 'paciente'"
        (click)="cambiarTab('paciente')"
        [disabled]="cargando">
        🧑‍⚕️ Soy Paciente
      </button>
      <button
        class="role-tab"
        [class.active]="tabActiva === 'medico'"
        (click)="cambiarTab('medico')"
        [disabled]="cargando">
        👨‍⚕️ Soy Médico
      </button>
    </div>

    <!-- Alertas -->
    <div class="alert alert-error" *ngIf="error">
      <span>⚠️</span> {{ error }}
    </div>
    <div class="alert alert-success" *ngIf="exito">
      {{ exito }}
    </div>

    <!-- ==================== FORMULARIO PACIENTE ==================== -->
    <ng-container *ngIf="tabActiva === 'paciente'">

      <div class="form-group">
        <label>Documento de Identidad</label>
        <input type="text" [(ngModel)]="formPaciente.documento"
               placeholder="Ej: 1002345678" [disabled]="cargando" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nombres</label>
          <input type="text" [(ngModel)]="formPaciente.nombres"
                 placeholder="Ej: Carlos" [disabled]="cargando" />
        </div>
        <div class="form-group">
          <label>Apellidos</label>
          <input type="text" [(ngModel)]="formPaciente.apellidos"
                 placeholder="Ej: Pérez" [disabled]="cargando" />
        </div>
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="formPaciente.email"
               placeholder="correo@ejemplo.com" [disabled]="cargando" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="formPaciente.password"
               placeholder="Mínimo 8 caracteres" [disabled]="cargando" />
      </div>

    </ng-container>

    <!-- ==================== FORMULARIO MÉDICO ==================== -->
    <ng-container *ngIf="tabActiva === 'medico'">

      <div class="form-group">
        <label>Documento de Identidad</label>
        <input type="text" [(ngModel)]="formMedico.documento"
               placeholder="Ej: 9001234567" [disabled]="cargando" />
      </div>

      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" [(ngModel)]="formMedico.nombre_completo"
               placeholder="Ej: Dra. María López" [disabled]="cargando" />
      </div>

      <div class="form-group">
        <label>Especialidad</label>
        <select [(ngModel)]="formMedico.id_especialidad" [disabled]="cargando">
          <option [ngValue]="0" disabled>— Selecciona una especialidad —</option>
          <option *ngFor="let esp of especialidades" [ngValue]="esp.id_especialidad">
            {{ esp.nombre_specialidad }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="formMedico.password"
               placeholder="Mínimo 8 caracteres" [disabled]="cargando" />
      </div>

    </ng-container>

    <button class="btn-login" (click)="registrar()" [disabled]="cargando">
      <span *ngIf="!cargando">Crear Cuenta</span>
      <span *ngIf="cargando">⏳ Registrando...</span>
    </button>

    <p class="login-footer">
      ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a>
    </p>

  </div>
</div>
